version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finance-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      - NODE_ENV=production
      - USE_KAFKA=false
      - REDIS_URL=redis://redis:6379
    ports:
      - '4000:4000'
    depends_on:
      - redis
    networks:
      - finance-net

  redis:
    image: redis:7-alpine
    container_name: finance-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - finance-net

  nginx:
    image: nginx:alpine
    container_name: finance-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - finance-net

volumes:
  redis-data:

networks:
  finance-net:
    driver: bridge
